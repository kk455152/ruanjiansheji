version: '3.8'

services:
  rabbitmq:
    image: m.daocloud.io/docker.io/library/rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=migrate
      - RABBITMQ_DEFAULT_PASS=2728

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    network_mode: host
    environment:
      - APP_HOST=0.0.0.0
      - APP_LISTEN_QUEUE=1024
      - GATEWAY_USE_GUNICORN=true
      - GATEWAY_WORKERS=4
      - GATEWAY_THREADS=8
      - GATEWAY_TIMEOUT=30
      - GATEWAY_KEEP_ALIVE=2
      - GATEWAY_METRICS_FILE=/runtime/gateway_metrics.json
      - GATEWAY_METRICS_FILE_PATTERN=/runtime/gateway_metrics.*.json
      - GATEWAY_METRICS_MULTIPROCESS=true
      - MQ_HOST=127.0.0.1
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    volumes:
      - ./runtime:/runtime
    restart: always

  auto-scaler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python auto_scaler.py
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runtime:/runtime
    environment:
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
      - GATEWAY_METRICS_URL=https://172.28.0.1/internal/metrics
      - GATEWAY_METRICS_FILE=/runtime/gateway_metrics.json
      - GATEWAY_METRICS_FILE_PATTERN=/runtime/gateway_metrics.*.json
      - MQ_QUEUE_API=http://172.28.0.1:15672/api/queues/%2f/writer_v2
      - SCALE_BASE_CONTAINER=smart-speaker-full-deploy_worker-writer_1
      - SCALE_MIN_WORKERS=1
      - SCALE_MAX_WORKERS=5
      - SCALE_UP_PUBLISH_RATE=15
      - SCALE_DOWN_PUBLISH_RATE=5
      - SCALE_UP_BACKLOG=50
      - SCALE_DOWN_BACKLOG=10
      - SCALE_CHECK_INTERVAL=5
      - SCALE_COOLDOWN_SECONDS=20
      - SCALE_DOWN_STABLE_CHECKS=3
      - SCALE_TARGET_RATE_PER_WORKER=10
    restart: always

  worker-writer:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_writer.py
    environment:
      - MQ_HOST=172.28.0.1
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
      - MYSQL_HOST=172.28.0.1
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=smart_speaker
      - MYSQL_USER=team
      - MYSQL_PASSWORD=123456
      - MONGO_URI=mongodb://y:123@172.28.0.1:27017/musicplayer?authSource=musicplayer
      - MONGO_DATABASE=musicplayer
      - MONGO_COLLECTION=device_metrics
    volumes:
      - /www/wwwroot/mysite/data_db:/www/wwwroot/mysite/data_db
    restart: always

  worker-logger:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_logger.py
    environment:
      - MQ_HOST=172.28.0.1
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    restart: always

  worker-validator:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_validator.py
    environment:
      - MQ_HOST=172.28.0.1
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    restart: always

  worker-reader:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_reader.py
    environment:
      - MQ_HOST=172.28.0.1
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    restart: always

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
