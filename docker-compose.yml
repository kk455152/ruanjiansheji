version: '3.8'

services:
  # 1. 消息中间件：提供数据通道与流量监控
  rabbitmq:
    image: m.daocloud.io/docker.io/library/rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # 管理后台端口，用于查看波浪线流量图
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  # 2. 安全网关：执行 HTTPS 校验与 AES 解密
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "443:443"
    depends_on:
      - rabbitmq
    restart: always

  # 3. 自动化大脑：负责根据压力自动启停 Worker
  auto-scaler:
    build:
      context: .
      dockerfile: Dockerfile.worker 
    command: python auto_scaler.py
    volumes:
      # 👈 核心：将宿主机的 Docker 守护进程挂载进容器，使其拥有“控制权”
      - /var/run/docker.sock:/var/run/docker.sock 
    depends_on:
      - rabbitmq
    restart: always

  # 4. 业务工人：被自动伸缩的对象
worker-writer:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_writer.py
    depends_on:
      - rabbitmq
    volumes:
      - /www/wwwroot/mysite/data_db:/www/wwwroot/mysite/data_db
    deploy:
      replicas: 1

  worker-logger:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_logger.py
    depends_on:
      - rabbitmq

  worker-validator:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_validator.py
    depends_on:
      - rabbitmq

  # 5. 可视化监控：直观展示容器增减
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000" # 👈 演示时展示给老师看的“大屏幕”
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
