version: '3.8'

services:
  rabbitmq:
    image: m.daocloud.io/docker.io/library/rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=migrate
      - RABBITMQ_DEFAULT_PASS=2728

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "443:443"
    environment:
      - MQ_HOST=rabbitmq
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    depends_on:
      - rabbitmq
    restart: always

  auto-scaler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python auto_scaler.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
      - MQ_MANAGEMENT_URL=http://rabbitmq:15672/api/queues/%2f/speaker_data
    depends_on:
      - rabbitmq
    restart: always

  worker-writer:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_writer.py
    environment:
      - MQ_HOST=rabbitmq
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    depends_on:
      - rabbitmq
    volumes:
      - /www/wwwroot/mysite/data_db:/www/wwwroot/mysite/data_db
    deploy:
      replicas: 1

  worker-logger:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_logger.py
    environment:
      - MQ_HOST=rabbitmq
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    depends_on:
      - rabbitmq

  worker-validator:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python worker_validator.py
    environment:
      - MQ_HOST=rabbitmq
      - MQ_USER=migrate
      - MQ_PASSWORD=2728
    depends_on:
      - rabbitmq

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
