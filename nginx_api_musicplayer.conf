server {
    listen 80;
    server_name api.musicplayer.cn 8.137.165.220;

    return 301 https://api.musicplayer.cn$request_uri;
}

server {
    listen 443 ssl;
    server_name api.musicplayer.cn;

    ssl_certificate /etc/nginx/cert/api.musicplayer.cn.pem;
    ssl_certificate_key /etc/nginx/cert/api.musicplayer.cn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:5000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
