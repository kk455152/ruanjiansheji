<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据库维护</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      color: #26342c;
      background: #f6faf7;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      background: #e9f7ee;
      border-bottom: 1px solid #d6ecdc;
      color: #224634;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header span { color: #7a9583; font-size: 12px; }
    main {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: calc(100vh - 61px);
    }
    aside {
      border-right: 1px solid #dceee2;
      background: #fff;
      padding: 16px;
      overflow: auto;
    }
    .source-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 9px 14px;
      background: #4f9f72;
      color: white;
      cursor: pointer;
      font: inherit;
    }
    button.secondary, .source-tabs button { background: #dfeee4; color: #416150; }
    .source-tabs button.active { background: #5aa77b; color: white; }
    button.danger { background: #d46b60; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .item-btn {
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
      text-align: left;
      background: transparent;
      color: #344b3b;
      cursor: pointer;
    }
    .item-btn.active, .item-btn:hover { background: #eef8f1; color: #2f7d55; }
    .item-btn small { color: #91a79a; display: block; margin-top: 2px; font-size: 11px; font-weight: 400; }
    section { min-width: 0; padding: 20px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #cfe3d5;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      background: white;
    }
    .toolbar input { width: 260px; }
    .status { margin: 12px 0; color: #7d9185; font-size: 12px; }
    .table-title {
      margin: 0 0 12px;
      color: #284d37;
      font-size: 16px;
      font-weight: 600;
    }
    .table-title small {
      margin-left: 8px;
      color: #9aac9f;
      font-size: 12px;
      font-weight: 400;
    }
    .panel {
      border: 1px solid #dceee2;
      border-radius: 8px;
      background: white;
      overflow: hidden;
    }
    .catalog {
      margin-bottom: 16px;
      border: 1px solid #dceee2;
      border-radius: 8px;
      background: white;
      overflow: hidden;
    }
    .catalog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #eef6f1;
      background: #f7fbf8;
    }
    .catalog-head h2 {
      margin: 0;
      color: #284d37;
      font-size: 16px;
      font-weight: 600;
    }
    .catalog-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .catalog-tools input { width: 260px; }
    .catalog-list {
      display: grid;
      gap: 10px;
      max-height: 340px;
      overflow: auto;
      padding: 12px;
    }
    .catalog-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid #e4f1e8;
      border-radius: 8px;
      background: #fbfdfc;
    }
    .catalog-card strong { color: #224634; }
    .catalog-card p {
      margin: 6px 0 0;
      color: #5d7467;
      font-size: 12px;
      line-height: 1.55;
      white-space: normal;
    }
    .catalog-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .catalog-meta span {
      padding: 2px 6px;
      border-radius: 4px;
      background: #edf6f0;
      color: #52715e;
      font-size: 11px;
    }
    .catalog-current {
      margin-top: 8px;
      padding: 8px 10px;
      border-left: 3px solid #4f9f72;
      border-radius: 6px;
      background: #f2faf5;
      color: #244b35;
      font-size: 12px;
      line-height: 1.5;
    }
    .catalog-warning {
      margin-top: 6px;
      color: #a45f00;
      font-size: 12px;
    }
    .field-focus {
      outline: 2px solid #e3a338;
      outline-offset: -2px;
      background: #fff7df !important;
    }
    .row-focus td {
      background: #fffaf0;
    }
    .table-wrap { overflow: auto; max-height: 58vh; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #eef6f1;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    th { position: sticky; top: 0; background: #f1f8f3; z-index: 1; }
    td.actions { display: flex; gap: 8px; }
    .field-name { font-weight: 600; color: #223d2e; }
    .field-comment {
      display: block;
      margin-top: 3px;
      color: #98aa9e;
      font-size: 11px;
      line-height: 1.35;
      white-space: normal;
      font-weight: 400;
    }
    .badges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 4px;
      padding: 1px 5px;
      background: #edf6f0;
      color: #6d8c78;
      font-size: 10px;
      line-height: 1.4;
    }
    .badge.pk { background: #fef3c7; color: #92400e; }
    .badge.insert { background: #e5f7eb; color: #4d8a62; }
    .badge.update { background: #e7f4ed; color: #4d8a62; }
    .editor {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-top: 1px solid #dceee2;
      background: #fbfdfc;
    }
    .editor.open { display: block; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    label span {
      display: block;
      margin-bottom: 5px;
      color: #2d3d33;
      font-size: 12px;
    }
    label span small {
      margin-left: 6px;
      color: #a0b0a5;
      font-size: 11px;
      font-weight: 400;
    }
    .field-hint {
      display: block;
      margin-top: 4px;
      color: #9aaca0;
      font-size: 11px;
      line-height: 1.45;
    }
    .json-editor textarea {
      min-height: 300px;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
    }
    body.catalog-mode main {
      display: block;
      min-height: calc(100vh - 61px);
    }
    body.catalog-mode aside {
      display: none;
    }
    body.catalog-mode .data-section {
      padding: 24px min(6vw, 72px);
    }
    body.catalog-mode .data-section > :not(.catalog) {
      display: none;
    }
    body.catalog-mode .catalog {
      margin: 0;
    }
    body.catalog-mode .catalog-list {
      max-height: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    body.table-mode .catalog {
      display: none;
    }
    body.table-mode main {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      aside { max-height: 240px; }
      .form-grid { grid-template-columns: 1fr; }
      body.catalog-mode .catalog-list { grid-template-columns: 1fr; }
      body.table-mode main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="catalog-mode">
  <header>
    <h1>数据库维护</h1>
    <span>维护 MySQL 表和 MongoDB 集合；play_history + media_mapping 会影响 Web 热歌排行，小程序播放后可刷新后台查看变化</span>
  </header>
  <main>
    <aside>
      <div class="source-tabs">
        <button id="mysqlTab" class="active">MySQL</button>
        <button id="mongoTab">MongoDB</button>
      </div>
      <div id="items"></div>
    </aside>
    <section class="data-section">
      <div class="catalog">
        <div class="catalog-head">
          <h2>前端数据维护目录</h2>
          <div class="catalog-tools">
            <input id="catalogKeyword" placeholder="搜索页面、数字、表名或字段">
            <button id="catalogFilterBtn" class="secondary">搜索</button>
            <button id="fixLogicBtn" class="secondary">修复逻辑数据</button>
            <button id="runDailyBtn">运行每日汇总</button>
            <button id="generateDemoBtn">生成模拟数据并汇总</button>
          </div>
        </div>
        <div id="catalogList" class="catalog-list">
          <p class="status">正在加载前端数据目录...</p>
        </div>
      </div>
      <div class="toolbar" id="mysqlToolbar">
        <input id="keyword" placeholder="MySQL 字段名，例如 username">
        <input id="keywordValue" placeholder="筛选值">
        <button id="filterBtn">筛选</button>
      </div>
      <div class="toolbar">
        <button id="backCatalogBtn" class="secondary">返回维护目录</button>
        <button id="reloadBtn" class="secondary">刷新</button>
        <button id="newBtn">新增</button>
      </div>
      <div id="status" class="status">正在加载...</div>
      <div id="tableTitle" class="table-title"></div>
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="editor" class="editor">
          <h3 id="editorTitle">编辑记录</h3>
          <div id="form" class="form-grid"></div>
          <div id="jsonForm" class="json-editor" style="display:none">
            <label>
              <span>MongoDB JSON 文档</span>
              <textarea id="jsonText"></textarea>
            </label>
          </div>
          <div class="toolbar" style="margin-top:14px">
            <button id="saveBtn">保存</button>
            <button id="cancelBtn" class="secondary">取消</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script>
    const state = {
      source: "mysql",
      mysql: { items: [], current: null, schema: null, rows: [] },
      mongo: { database: "", items: [], current: null, columns: [], rows: [] },
      catalog: [],
      catalogKeyword: "",
      focusFields: [],
      mode: "create",
      pk: null,
      currentDocId: null,
    };
    const MONGO_META = {
      device_runtime: {
        label: "设备实时状态",
        sample: { device_id: 20001, deviceId: "20001", device_number: "SHMINI-A1-0001", online: true, battery: 82, volume: 45, signalStrength: -58, networkType: "wifi" },
      },
      player_state: {
        label: "播放器当前状态",
        sample: { device_id: 20001, deviceId: "20001", isPlaying: true, songId: "1491830535", songName: "稻香", artist: "周杰伦", source: "netease", playTime: 96 },
      },
      play_queue: {
        label: "下一首播放队列",
        sample: { device_id: 20001, deviceId: "20001", queue: [{ songId: "song_30001", songName: "晴天", artist: "周杰伦" }] },
      },
      operation_logs: {
        label: "运行操作日志",
        sample: { requestId: "REQ202606040001", device_id: 20001, action: "play", source: "manual", result: "success" },
      },
      media_metadata: {
        label: "歌曲元数据缓存",
        sample: { song_id: "1491830535", external_id: "1491830535", name: "稻香", artist: "周杰伦", cover_url: "https://cdn.example.com/covers/daoxiang.jpg", duration: 223 },
      },
    };
    const MONGO_FIELD_COMMENTS = {
      _id: "MongoDB 自动主键",
      device_id: "关联 MySQL device.device_id",
      deviceId: "前端使用的设备 ID 字符串",
      device_number: "设备 SN",
      online: "是否在线",
      battery: "电量百分比",
      volume: "当前音量",
      signalStrength: "Wi-Fi 信号强度",
      networkType: "网络类型",
      isPlaying: "是否播放中",
      songId: "歌曲 ID",
      songName: "歌曲名称",
      artist: "歌手",
      source: "来源",
      playTime: "播放进度秒数",
      queue: "播放队列",
      requestId: "请求追踪 ID",
      action: "操作动作",
      result: "执行结果",
      created_at: "创建时间",
      updated_at: "更新时间",
    };
    const el = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const res = await fetch(path, {
        method: options.method || "GET",
        headers: options.body ? { "Content-Type": "application/json" } : {},
        body: options.body ? JSON.stringify(options.body) : undefined,
      });
      const payload = await res.json();
      if (!res.ok || payload.status === "error") throw new Error(payload.message || "请求失败");
      return payload.data;
    }

    function setStatus(text) { el("status").textContent = text; }
    function currentStore() { return state[state.source]; }
    function tableInfo(key) { return state.mysql.items.find((item) => item.key === key) || null; }
    function setView(view) {
      document.body.classList.toggle("catalog-mode", view === "catalog");
      document.body.classList.toggle("table-mode", view === "table");
    }
    function metaFor(column) {
      return (state.mysql.schema?.columnMeta || []).find((item) => item.name === column) || {
        name: column,
        label: column,
        comment: "请按接口文档和实际业务含义填写。",
      };
    }

    function setSource(source) {
      state.source = source;
      el("mysqlTab").classList.toggle("active", source === "mysql");
      el("mongoTab").classList.toggle("active", source === "mongo");
      el("mysqlToolbar").style.display = source === "mysql" ? "flex" : "none";
      closeEditor();
      renderItems();
      const store = currentStore();
      if (store.current) loadRows();
    }

    async function loadSources() {
      const [mysql, mongo, catalog] = await Promise.all([
        api("/api/db/mysql/tables"),
        api("/api/db/mongo/collections"),
        api("/api/db/front-data-catalog"),
      ]);
      state.mysql.items = mysql;
      state.mongo.database = mongo.database;
      state.mongo.items = mongo.collections;
      state.catalog = catalog.list || [];
      state.mysql.current = mysql[0]?.key || null;
      state.mongo.current = mongo.collections[0]?.name || null;
      renderItems();
      renderCatalog();
      await loadRows();
    }

    function renderItems() {
      const store = currentStore();
      const html = state.source === "mysql"
        ? store.items.map((t) => `<button class="item-btn" data-key="${escapeHtml(t.key)}">${escapeHtml(t.key)}<small>${escapeHtml(t.label || "")} / ${escapeHtml(t.table)}</small></button>`).join("")
        : store.items.map((c) => `<button class="item-btn" data-key="${escapeHtml(c.name)}">${escapeHtml(c.name)}<small>${escapeHtml(MONGO_META[c.name]?.label || "MongoDB collection")} / ${c.count} 条</small></button>`).join("");
      el("items").innerHTML = html || "<p class='status'>没有可显示的数据源</p>";
      el("items").querySelectorAll("button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.key === store.current);
        btn.onclick = () => selectItem(btn.dataset.key);
      });
    }

    function renderCatalog() {
      const word = (state.catalogKeyword || "").trim().toLowerCase();
      const rows = state.catalog.filter((item) => {
        if (!word) return true;
        return [item.group, item.title, item.frontend, item.api, item.table, ...(item.fields || []), item.operation]
          .some((value) => String(value || "").toLowerCase().includes(word));
      });
      el("catalogList").innerHTML = rows.map((item, index) => `
        <div class="catalog-card">
          <div>
            <strong>${escapeHtml(item.group)} / ${escapeHtml(item.title)}</strong>
            <div class="catalog-current">当前前端值：${escapeHtml(item.current || "正在读取或暂无数据")}</div>
            ${item.warning && !String(item.warning).startsWith("0 ") ? `<div class="catalog-warning">需要处理：${escapeHtml(item.warning)}</div>` : ""}
            <p>${escapeHtml(item.operation)}</p>
            <div class="catalog-meta">
              <span>${escapeHtml(item.frontend || "")}</span>
              <span>${escapeHtml(item.api || "")}</span>
              <span>${escapeHtml(item.table || "")}</span>
              ${(item.fields || []).map((field) => `<span>${escapeHtml(field)}</span>`).join("")}
            </div>
          </div>
          <button data-catalog-index="${index}">去维护</button>
        </div>
      `).join("") || "<p class='status'>没有匹配的前端数据项</p>";
      el("catalogList").querySelectorAll("[data-catalog-index]").forEach((btn) => {
        btn.onclick = () => openCatalogTarget(rows[Number(btn.dataset.catalogIndex)]);
      });
    }

    async function openCatalogTarget(item) {
      if (!item?.table) return;
      setView("table");
      state.focusFields = item.fields || [];
      if (state.source !== "mysql") setSource("mysql");
      state.mysql.current = item.table;
      closeEditor();
      renderItems();
      await loadRows();
      setStatus(`已定位：${item.title} / ${item.table}，黄色字段就是建议修改的位置`);
      document.querySelector(".panel")?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    async function selectItem(key) {
      currentStore().current = key;
      state.focusFields = [];
      closeEditor();
      renderItems();
      await loadRows();
    }

    async function loadRows() {
      if (state.source === "mysql") return loadMysqlRows();
      return loadMongoRows();
    }

    async function loadMysqlRows() {
      const store = state.mysql;
      if (!store.current) return;
      const params = new URLSearchParams({ limit: "100", offset: "0" });
      const field = el("keyword").value.trim();
      const value = el("keywordValue").value.trim();
      if (field && value) params.set(field, value);
      const data = await api(`/api/db/${store.current}?${params.toString()}`);
      store.schema = data.schema;
      store.rows = data.list || [];
      renderMysqlTable();
      applyFieldFocus();
      const info = tableInfo(store.current);
      el("tableTitle").innerHTML = `${escapeHtml(store.current)} <small>${escapeHtml(info?.label || "")}</small>`;
      setStatus(`MySQL / ${store.current}: 共 ${data.total || 0} 条，当前显示 ${store.rows.length} 条`);
    }

    async function loadMongoRows() {
      const store = state.mongo;
      if (!store.current) return;
      const data = await api(`/api/db/mongo/${encodeURIComponent(store.current)}?limit=100&offset=0`);
      store.columns = data.columns || [];
      store.rows = data.list || [];
      renderMongoTable();
      el("tableTitle").innerHTML = `${escapeHtml(data.collection)} <small>${escapeHtml(MONGO_META[data.collection]?.label || "MongoDB collection")}</small>`;
      setStatus(`MongoDB / ${data.collection}: 共 ${data.total || 0} 条，当前显示 ${store.rows.length} 条`);
    }

    function renderMysqlTable() {
      const columns = state.mysql.schema.columns;
      el("thead").innerHTML = `<tr>${columns.map((c) => `<th>${renderHeader(c)}</th>`).join("")}<th>操作</th></tr>`;
      el("tbody").innerHTML = state.mysql.rows.map((row, index) => `
        <tr>
          ${columns.map((c) => `<td title="${escapeHtml(formatValue(row[c]))}">${escapeHtml(formatValue(row[c]))}</td>`).join("")}
          <td class="actions">
            <button data-edit="${index}">编辑</button>
            <button class="danger" data-del="${index}">删除</button>
          </td>
        </tr>
      `).join("");
      el("tbody").querySelectorAll("[data-edit]").forEach((btn) => btn.onclick = () => openMysqlEditor("edit", state.mysql.rows[btn.dataset.edit]));
      el("tbody").querySelectorAll("[data-del]").forEach((btn) => btn.onclick = () => deleteMysqlRow(state.mysql.rows[btn.dataset.del]));
    }

    function renderHeader(column) {
      const meta = metaFor(column);
      return `<span class="field-name">${escapeHtml(column)}</span><span class="field-comment">${escapeHtml(meta.label || "")} ${escapeHtml(meta.comment || "")}</span>`;
    }

    function applyFieldFocus() {
      const columns = state.mysql.schema?.columns || [];
      const focus = new Set(state.focusFields || []);
      document.querySelectorAll(".field-focus").forEach((node) => node.classList.remove("field-focus"));
      document.querySelectorAll(".row-focus").forEach((node) => node.classList.remove("row-focus"));
      if (!focus.size) return;
      el("thead").querySelectorAll("th").forEach((th, index) => {
        if (focus.has(columns[index])) th.classList.add("field-focus");
      });
      el("tbody").querySelectorAll("tr").forEach((tr) => {
        tr.classList.add("row-focus");
        tr.querySelectorAll("td").forEach((td, index) => {
          if (focus.has(columns[index])) td.classList.add("field-focus");
        });
      });
    }

    function renderMongoTable() {
      const columns = state.mongo.columns.length ? state.mongo.columns : ["_id"];
      el("thead").innerHTML = `<tr>${columns.map((c) => `<th>${renderMongoHeader(c)}</th>`).join("")}<th>操作</th></tr>`;
      el("tbody").innerHTML = state.mongo.rows.map((row, index) => `
        <tr>
          ${columns.map((c) => `<td title="${escapeHtml(valueText(row[c]))}">${escapeHtml(valueText(row[c]))}</td>`).join("")}
          <td class="actions">
            <button data-edit="${index}">编辑</button>
            <button class="danger" data-del="${index}">删除</button>
          </td>
        </tr>
      `).join("");
      el("tbody").querySelectorAll("[data-edit]").forEach((btn) => btn.onclick = () => openMongoEditor("edit", state.mongo.rows[btn.dataset.edit]));
      el("tbody").querySelectorAll("[data-del]").forEach((btn) => btn.onclick = () => deleteMongoRow(state.mongo.rows[btn.dataset.del]));
    }

    function renderMongoHeader(column) {
      return `<span class="field-name">${escapeHtml(column)}</span><span class="field-comment">${escapeHtml(MONGO_FIELD_COMMENTS[column] || "")}</span>`;
    }

    function valueText(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "object") return JSON.stringify(value);
      return String(value);
    }

    function formatValue(value) {
      return String(value ?? "");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
    }

    function openMysqlEditor(mode, row = {}) {
      state.mode = mode;
      state.pk = {};
      for (const key of state.mysql.schema.pk) state.pk[key] = row[key];
      const fields = mode === "create" ? state.mysql.schema.insertColumns : state.mysql.schema.updateColumns;
      el("editorTitle").textContent = mode === "create" ? `新增 MySQL / ${state.mysql.current}` : `编辑 MySQL / ${state.mysql.current}`;
      el("jsonForm").style.display = "none";
      el("form").style.display = "grid";
      el("form").innerHTML = fields.map((field) => {
        const meta = metaFor(field);
        return `
          <label>
            <span>${escapeHtml(field)} <small>${escapeHtml(meta.label || "")}</small></span>
            <textarea data-field="${escapeHtml(field)}" rows="2">${escapeHtml(formatValue(row[field]))}</textarea>
            <small class="field-hint">${escapeHtml(meta.comment || "")}</small>
          </label>
        `;
      }).join("");
      el("editor").classList.add("open");
    }

    function openMongoEditor(mode, row = {}) {
      state.mode = mode;
      state.currentDocId = row._id || null;
      const copy = mode === "create"
        ? { ...(Object.keys(row).length ? row : (MONGO_META[state.mongo.current]?.sample || { name: "example", value: "edit me" })) }
        : { ...row };
      if (mode === "create") copy.updated_at = new Date().toISOString().slice(0, 19).replace("T", " ");
      if (mode === "create") delete copy._id;
      el("editorTitle").textContent = mode === "create" ? `新增 MongoDB / ${state.mongo.current}` : `编辑 MongoDB / ${state.mongo.current}`;
      el("form").style.display = "none";
      el("jsonForm").style.display = "block";
      el("jsonForm").querySelector("span").innerHTML = `MongoDB JSON 文档 <small>${escapeHtml(MONGO_META[state.mongo.current]?.label || "按集合含义填写")}</small>`;
      el("jsonText").value = JSON.stringify(copy, null, 2);
      el("editor").classList.add("open");
    }

    function closeEditor() {
      el("editor").classList.remove("open");
      el("form").innerHTML = "";
      el("jsonText").value = "";
    }

    function collectMysqlForm() {
      const data = {};
      el("form").querySelectorAll("[data-field]").forEach((input) => {
        data[input.dataset.field] = input.value === "" ? null : input.value;
      });
      return data;
    }

    function pkPath(row) {
      if (state.mysql.schema.pk.length !== 1) throw new Error("联合主键表请使用对应 detail 接口维护");
      return encodeURIComponent(row[state.mysql.schema.pk[0]]);
    }

    async function saveRow() {
      el("saveBtn").disabled = true;
      setStatus("正在保存...");
      try {
        if (state.source === "mysql") {
          await saveMysqlRow();
        } else {
          await saveMongoRow();
        }
        setStatus("保存成功，列表已刷新");
      } catch (err) {
        setStatus(`保存失败：${err.message}`);
        alert(`保存失败：${err.message}`);
      } finally {
        el("saveBtn").disabled = false;
      }
    }

    async function saveMysqlRow() {
      const data = collectMysqlForm();
      if (state.mode === "create") {
        await api(`/api/db/${state.mysql.current}`, { method: "POST", body: data });
      } else {
        await api(`/api/db/${state.mysql.current}/${pkPath(state.pk)}`, { method: "PUT", body: data });
      }
      closeEditor();
      await loadRows();
      const catalog = await api("/api/db/front-data-catalog");
      state.catalog = catalog.list || [];
      renderCatalog();
    }

    async function saveMongoRow() {
      let data;
      try {
        data = JSON.parse(el("jsonText").value || "{}");
      } catch (err) {
        throw new Error("JSON 格式不正确");
      }
      if (state.mode === "create") {
        await api(`/api/db/mongo/${encodeURIComponent(state.mongo.current)}`, { method: "POST", body: data });
      } else {
        await api(`/api/db/mongo/${encodeURIComponent(state.mongo.current)}/${encodeURIComponent(state.currentDocId)}`, { method: "PUT", body: data });
      }
      closeEditor();
      await loadRows();
    }

    async function deleteMysqlRow(row) {
      if (!confirm("确定删除这条 MySQL 记录吗？")) return;
      await api(`/api/db/${state.mysql.current}/${pkPath(row)}`, { method: "DELETE" });
      await loadRows();
    }

    async function deleteMongoRow(row) {
      if (!confirm("确定删除这条 MongoDB 文档吗？")) return;
      await api(`/api/db/mongo/${encodeURIComponent(state.mongo.current)}/${encodeURIComponent(row._id)}`, { method: "DELETE" });
      await loadRows();
    }

    async function openNew() {
      const label = state.source === "mysql" ? state.mysql.current : state.mongo.current;
      if (!label) return;
      if (state.source === "mysql") {
        const sample = await api(`/api/db/${state.mysql.current}/sample`);
        openMysqlEditor("create", sample);
      } else {
        const sample = await api(`/api/db/mongo/${encodeURIComponent(state.mongo.current)}/sample`);
        openMongoEditor("create", sample);
      }
      setStatus(`已生成随机模拟数据，可修改后保存：${label}`);
    }

    async function runDailyStats(generateDemo = false) {
      el("runDailyBtn").disabled = true;
      el("generateDemoBtn").disabled = true;
      setStatus(generateDemo ? "正在生成中文模拟数据并运行每日汇总..." : "正在运行每日汇总...");
      try {
        const data = await api("/api/db/daily-stats/run", {
          method: "POST",
          body: generateDemo
            ? {
                skip_seed: true,
                skip_generate: true,
                generate_demo_data: true,
                demo_user_count: 32,
                demo_device_count: 18,
                demo_order_count: 24,
                demo_play_count: 120,
              }
            : { skip_seed: true, skip_generate: true },
        });
        const demo = data.demo_data || {};
        const demoText = generateDemo
          ? `；模拟用户 ${demo.users || 0}，设备 ${demo.devices || 0}，订单 ${demo.orders || 0}，播放 ${demo.play_history || 0}`
          : "";
        setStatus(`每日汇总完成：${(data.refreshed_daily_tables || []).join(", ")}${demoText}`);
        await loadRows();
        const catalog = await api("/api/db/front-data-catalog");
        state.catalog = catalog.list || [];
        renderCatalog();
      } catch (err) {
        setStatus(`每日汇总失败：${err.message}`);
      } finally {
        el("runDailyBtn").disabled = false;
        el("generateDemoBtn").disabled = false;
      }
    }

    async function fixLogicalData() {
      el("fixLogicBtn").disabled = true;
      setStatus("正在修复年龄段等逻辑数据...");
      try {
        const data = await api("/api/db/maintenance/fix-logical-data", { method: "POST", body: {} });
        setStatus(`逻辑数据修复完成：年龄段修复 ${data.fixedAgeRanges || 0} 条`);
        const catalog = await api("/api/db/front-data-catalog");
        state.catalog = catalog.list || [];
        renderCatalog();
        await loadRows();
      } catch (err) {
        setStatus(`逻辑数据修复失败：${err.message}`);
        alert(`逻辑数据修复失败：${err.message}`);
      } finally {
        el("fixLogicBtn").disabled = false;
      }
    }

    el("mysqlTab").onclick = () => setSource("mysql");
    el("mongoTab").onclick = () => setSource("mongo");
    el("catalogFilterBtn").onclick = () => {
      state.catalogKeyword = el("catalogKeyword").value;
      renderCatalog();
    };
    el("catalogKeyword").onkeydown = (event) => {
      if (event.key === "Enter") {
        state.catalogKeyword = el("catalogKeyword").value;
        renderCatalog();
      }
    };
    el("runDailyBtn").onclick = () => runDailyStats(false);
    el("generateDemoBtn").onclick = () => runDailyStats(true);
    el("fixLogicBtn").onclick = fixLogicalData;
    el("backCatalogBtn").onclick = async () => {
      setView("catalog");
      const catalog = await api("/api/db/front-data-catalog");
      state.catalog = catalog.list || [];
      renderCatalog();
    };
    el("filterBtn").onclick = loadRows;
    el("reloadBtn").onclick = loadRows;
    el("newBtn").onclick = openNew;
    el("saveBtn").onclick = saveRow;
    el("cancelBtn").onclick = closeEditor;
    loadSources().catch((err) => setStatus(err.message));
  </script>
</body>
</html>
