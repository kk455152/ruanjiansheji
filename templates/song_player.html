<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网易云歌曲播放界面</title>
  <style>
    :root {
      --bg: #0d1321;
      --panel: rgba(18, 27, 47, 0.86);
      --panel-strong: #15213b;
      --accent: #ff6b35;
      --accent-soft: #ff9f1c;
      --text: #f5f7ff;
      --muted: #a7b0c5;
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 159, 28, 0.18), transparent 24%),
        radial-gradient(circle at bottom right, rgba(40, 210, 255, 0.18), transparent 22%),
        linear-gradient(135deg, #08101f, #111a2d 45%, #0e1627);
    }

    .shell {
      width: min(1200px, calc(100vw - 32px));
      margin: 32px auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      color: #ffe8dd;
      background: rgba(255, 107, 53, 0.18);
      border: 1px solid rgba(255, 107, 53, 0.24);
      font-size: 13px;
    }

    h1 {
      margin: 0;
      line-height: 1.05;
      font-size: clamp(34px, 5vw, 52px);
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .source-card {
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .source-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 15px;
    }

    .player-panel {
      padding: 28px;
      display: grid;
      gap: 22px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    .search-input {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 16px;
      font-size: 16px;
      outline: none;
    }

    .search-input:focus {
      border-color: rgba(255, 159, 28, 0.6);
      box-shadow: 0 0 0 4px rgba(255, 159, 28, 0.12);
    }

    .search-button,
    .play-button {
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .search-button {
      min-width: 132px;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #151515;
    }

    .search-button:hover,
    .play-button:hover {
      transform: translateY(-1px);
      opacity: 0.94;
    }

    .now-playing {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 22px;
      padding: 20px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255, 107, 53, 0.14), rgba(40, 210, 255, 0.09)),
        rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
    }

    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      object-fit: cover;
      background: linear-gradient(135deg, #29344d, #0f1728);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .song-meta {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      min-width: 0;
    }

    .song-meta .tag {
      width: fit-content;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .song-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .song-desc,
    .status {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    audio {
      width: 100%;
      filter: saturate(1.12);
    }

    .results-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .results-head h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .song-card {
      display: grid;
      gap: 14px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--line);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .song-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 159, 28, 0.35);
      background: rgba(255, 255, 255, 0.055);
    }

    .song-card-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      word-break: break-word;
    }

    .song-card-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .play-button {
      padding: 12px 14px;
      background: rgba(255, 107, 53, 0.14);
      color: #ffd7c8;
      border: 1px solid rgba(255, 107, 53, 0.2);
    }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: 20px;
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .now-playing {
        grid-template-columns: 1fr;
      }

      .cover {
        max-width: 240px;
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: min(100vw - 20px, 1200px);
        margin: 10px auto 20px;
      }

      .hero,
      .player-panel {
        padding: 18px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .search-button {
        min-height: 52px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel hero">
      <div class="eyebrow">NetEase Source Connected</div>
      <h1>网易云歌曲<br>本地播放界面</h1>
      <p class="lead">
        这个界面会通过你当前项目里已经接入的网易云兼容来源搜索歌曲，
        然后拉取播放链接，并直接在浏览器里播放。
      </p>
      <div class="source-card">
        <strong>当前连接的来源</strong>
        <div id="sourceText">正在读取来源配置...</div>
      </div>
    </section>

    <section class="panel player-panel">
      <form id="searchForm" class="search-row">
        <input id="keywordInput" class="search-input" type="text" placeholder="输入歌名，例如：稻香、晴天、夜曲" value="稻香">
        <button class="search-button" type="submit">搜索并展示</button>
      </form>

      <section class="now-playing">
        <img id="coverImage" class="cover" alt="cover">
        <div class="song-meta">
          <div class="tag" id="providerTag">尚未播放</div>
          <h2 id="songTitle" class="song-title">请选择一首歌</h2>
          <p id="songDesc" class="song-desc">搜索结果会显示在下方，点击“立即播放”即可开始。</p>
          <audio id="audioPlayer" controls preload="none"></audio>
          <p id="statusText" class="status">准备就绪。</p>
        </div>
      </section>

      <div class="results-head">
        <h2>搜索结果</h2>
        <p id="resultSummary" class="status">输入关键词后开始搜索。</p>
      </div>

      <section id="resultsGrid" class="results-grid">
        <div class="empty">还没有搜索结果。</div>
      </section>
    </section>
  </main>

  <script>
    const form = document.getElementById("searchForm");
    const keywordInput = document.getElementById("keywordInput");
    const sourceText = document.getElementById("sourceText");
    const resultSummary = document.getElementById("resultSummary");
    const resultsGrid = document.getElementById("resultsGrid");
    const providerTag = document.getElementById("providerTag");
    const songTitle = document.getElementById("songTitle");
    const songDesc = document.getElementById("songDesc");
    const coverImage = document.getElementById("coverImage");
    const audioPlayer = document.getElementById("audioPlayer");
    const statusText = document.getElementById("statusText");

    const defaultCover =
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">' +
        '<defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1">' +
        '<stop stop-color="#ff6b35"/><stop offset="1" stop-color="#28d2ff"/>' +
        "</linearGradient></defs>" +
        '<rect width="320" height="320" rx="40" fill="url(#g)"/>' +
        '<circle cx="160" cy="160" r="74" fill="rgba(10,15,30,.4)"/>' +
        '<circle cx="160" cy="160" r="20" fill="#f5f7ff"/>' +
        "</svg>"
      );

    coverImage.src = defaultCover;

    async function loadSourceInfo() {
      try {
        const response = await fetch("/api/source");
        const payload = await response.json();
        if (!payload.ok) {
          sourceText.textContent = "来源读取失败。";
          return;
        }
        sourceText.innerHTML =
          `主来源：<code>${payload.binaryify_base_url}</code><br>` +
          `回退来源：<code>${payload.gdstudio_base_url}</code>`;
      } catch (error) {
        sourceText.textContent = "来源读取失败。";
      }
    }

    function renderEmpty(message) {
      resultsGrid.innerHTML = `<div class="empty">${message}</div>`;
    }

    function renderSongs(songs, provider, keyword) {
      if (!songs.length) {
        renderEmpty("没有找到可播放的结果。");
        return;
      }

      resultSummary.textContent = `关键词“${keyword}” 共返回 ${songs.length} 条结果，当前来源：${provider}`;
      resultsGrid.innerHTML = songs
        .map((song) => {
          const artists = (song.artists || []).join(" / ") || "未知歌手";
          const cover = song.cover_url || "";
          return `
            <article class="song-card">
              <div>
                <h3 class="song-card-title">${song.name || "未命名歌曲"}</h3>
                <p class="song-card-text">${artists}</p>
                <p class="song-card-text">专辑：${song.album || "未知专辑"}</p>
              </div>
              <button
                class="play-button"
                type="button"
                data-song-id="${song.song_id}"
                data-provider="${song.provider}"
                data-name="${encodeURIComponent(song.name || "")}"
                data-artists="${encodeURIComponent(artists)}"
                data-album="${encodeURIComponent(song.album || "")}"
                data-cover="${encodeURIComponent(cover)}"
              >
                立即播放
              </button>
            </article>
          `;
        })
        .join("");
    }

    async function searchSongs(keyword) {
      statusText.textContent = "正在搜索歌曲...";
      resultSummary.textContent = "搜索中...";
      renderEmpty("正在请求网易云兼容来源...");

      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(keyword)}`);
        const payload = await response.json();
        if (!payload.ok) {
          throw new Error(payload.message || "搜索失败");
        }
        renderSongs(payload.songs || [], payload.provider || "unknown", payload.keyword || keyword);
        statusText.textContent = "搜索完成，请选择一首歌播放。";
      } catch (error) {
        renderEmpty(`搜索失败：${error.message}`);
        statusText.textContent = "搜索失败，请稍后重试。";
      }
    }

    async function playSong(button) {
      const songId = button.dataset.songId;
      const provider = button.dataset.provider;
      const name = decodeURIComponent(button.dataset.name || "");
      const artists = decodeURIComponent(button.dataset.artists || "");
      const album = decodeURIComponent(button.dataset.album || "");
      const cover = decodeURIComponent(button.dataset.cover || "");

      providerTag.textContent = provider;
      songTitle.textContent = name || "未命名歌曲";
      songDesc.textContent = `${artists || "未知歌手"} · ${album || "未知专辑"}`;
      coverImage.src = cover || defaultCover;
      statusText.textContent = "正在拉取播放链接...";

      try {
        const url =
          `/api/play?song_id=${encodeURIComponent(songId)}` +
          `&provider=${encodeURIComponent(provider)}` +
          `&cover_url=${encodeURIComponent(cover)}`;
        const response = await fetch(url);
        const payload = await response.json();
        if (!payload.ok) {
          throw new Error(payload.message || "播放链接获取失败");
        }

        coverImage.src = payload.cover_url || cover || defaultCover;
        audioPlayer.src = payload.play_url;
        audioPlayer.play();
        statusText.textContent = "播放链接已就绪，正在播放。";
      } catch (error) {
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
        statusText.textContent = `播放失败：${error.message}`;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const keyword = keywordInput.value.trim();
      if (!keyword) {
        renderEmpty("请输入歌曲关键词。");
        return;
      }
      await searchSongs(keyword);
    });

    resultsGrid.addEventListener("click", async (event) => {
      const button = event.target.closest(".play-button");
      if (!button) {
        return;
      }
      await playSong(button);
    });

    loadSourceInfo();
    searchSongs(keywordInput.value.trim());
  </script>
</body>
</html>
